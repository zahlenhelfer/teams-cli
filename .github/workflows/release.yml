name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: teams-cli-linux-amd64
            strip: true
          - os: macos-latest
            artifact_name: teams-cli-darwin-arm64
            strip: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PyInstaller build
        uses: actions/cache@v4
        with:
          path: build/
          key: ${{ runner.os }}-pyinstaller-${{ hashFiles('teams_cli.py', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pyinstaller-

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Inject version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python3 -c "
          content = open('teams_cli.py').read().replace('__version__ = \"0.0.0\"', '__version__ = \"$VERSION\"')
          open('teams_cli.py', 'w').write(content)
          "

      - name: Build binary
        run: |
          pyinstaller --onefile \
            --name ${{ matrix.artifact_name }} \
            ${{ matrix.strip && '--strip' || '' }} \
            --exclude-module tkinter \
            --exclude-module _tkinter \
            --exclude-module unittest \
            --exclude-module xml \
            --exclude-module html \
            --exclude-module pydoc \
            --exclude-module doctest \
            --exclude-module difflib \
            --exclude-module sqlite3 \
            --exclude-module multiprocessing \
            --exclude-module asyncio \
            --exclude-module concurrent \
            --exclude-module http.server \
            --exclude-module xmlrpc \
            teams_cli.py

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: dist/${{ matrix.artifact_name }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.artifact_name }}.cdx.json
          upload-artifact: false

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.artifact_name }}
          path: sbom-${{ matrix.artifact_name }}.cdx.json

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: teams-cli-*
          path: dist/
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: sbom-*
          path: sbom/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            sbom/*.cdx.json
